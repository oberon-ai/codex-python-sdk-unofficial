name: Prepare Legacy Codex Release

on:
  workflow_dispatch:
    inputs:
      base_ref:
        description: "Git ref to prepare from; defaults to main but can point at a test branch"
        required: false
        default: "main"
        type: string
      target_version:
        description: "Codex release version or tag to prepare from a fresh main checkout"
        required: true
        type: string
      skip_verification:
        description: "Skip repository verification after Codex updates the checkout"
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: legacy-release-${{ inputs.target_version }}
  cancel-in-progress: false

jobs:
  prepare-legacy-release:
    runs-on: ubuntu-latest
    env:
      CONTROLLER_PATH: controller
      TARGET_PATH: target
      CODEX_HOME: ${{ github.workspace }}/.codex-runtime

    steps:
      - name: Check out workflow controller
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true
          path: controller

      - name: Check out target repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          clean: true
          path: target

      - name: Ensure fresh target checkout
        env:
          BASE_REF: ${{ inputs.base_ref }}
        working-directory: ${{ env.TARGET_PATH }}
        run: |
          base_ref="${BASE_REF:-main}"
          git fetch origin "$base_ref"
          if git show-ref --verify --quiet "refs/remotes/origin/$base_ref"; then
            git checkout --detach "origin/$base_ref"
          else
            git checkout --detach FETCH_HEAD
          fi
          if [ -n "$(git status --porcelain)" ]; then
            echo "Expected a clean checkout before preparing a legacy release." >&2
            git status --short >&2
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install Codex CLI
        run: npm install --global @openai/codex

      - name: Show Codex version
        run: codex --version

      - name: Bootstrap Codex API-key auth
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          mkdir -p "$CODEX_HOME"
          printenv OPENAI_API_KEY | codex login --with-api-key

      - name: Sync project environment
        working-directory: ${{ env.CONTROLLER_PATH }}
        run: uv sync --group codegen

      - name: Run legacy release tracker
        id: tracker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TARGET_VERSION: ${{ inputs.target_version }}
          SKIP_VERIFICATION: ${{ inputs.skip_verification }}
          TARGET_REPO: ${{ github.workspace }}/target
        working-directory: ${{ env.CONTROLLER_PATH }}
        run: |
          cmd=(
            uv run python -m codex_meta_agent
            --repo-root "$TARGET_REPO"
            --github-output "$GITHUB_OUTPUT"
            --target-version "$TARGET_VERSION"
            --tracking-branch-prefix "puck/flegacy-release--"
          )
          if [ "$SKIP_VERIFICATION" = "true" ]; then
            cmd+=(--skip-verification)
          fi
          "${cmd[@]}"

      - name: Check whether legacy branch already exists
        if: steps.tracker.outputs.changed == 'true'
        id: existing_branch
        working-directory: ${{ env.TARGET_PATH }}
        run: |
          if git ls-remote --exit-code --heads origin "${{ steps.tracker.outputs.release_branch }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit legacy release changes
        if: steps.tracker.outputs.changed == 'true' && steps.existing_branch.outputs.exists != 'true'
        env:
          TRACKER_GIT_AUTHOR_NAME: ${{ secrets.TRACKER_GIT_AUTHOR_NAME }}
          TRACKER_GIT_AUTHOR_EMAIL: ${{ secrets.TRACKER_GIT_AUTHOR_EMAIL }}
          GITHUB_ACTOR_NAME: ${{ github.actor }}
        working-directory: ${{ env.TARGET_PATH }}
        run: |
          author_name="${TRACKER_GIT_AUTHOR_NAME:-$GITHUB_ACTOR_NAME}"
          if [ -n "$TRACKER_GIT_AUTHOR_EMAIL" ]; then
            author_email="$TRACKER_GIT_AUTHOR_EMAIL"
          elif [ "$GITHUB_ACTOR_NAME" = "github-actions[bot]" ]; then
            author_email="41898282+github-actions[bot]@users.noreply.github.com"
          else
            author_email="$GITHUB_ACTOR_NAME@users.noreply.github.com"
          fi
          git switch -c "${{ steps.tracker.outputs.release_branch }}"
          git config user.name "$author_name"
          git config user.email "$author_email"
          git add -A
          git commit -m "${{ steps.tracker.outputs.commit_message }}"
          git push origin "HEAD:${{ steps.tracker.outputs.release_branch }}"

      - name: Check whether legacy release PR already exists
        if: steps.tracker.outputs.changed == 'true'
        id: existing_pr
        env:
          GH_TOKEN: ${{ secrets.TRACKER_GH_TOKEN || secrets.GITHUB_TOKEN }}
        working-directory: ${{ env.TARGET_PATH }}
        run: |
          pr_url="$(gh pr list \
            --base main \
            --head "${{ steps.tracker.outputs.release_branch }}" \
            --state open \
            --json url \
            --jq '.[0].url // ""')"
          echo "url=$pr_url" >> "$GITHUB_OUTPUT"

      - name: Create legacy release PR
        if: steps.tracker.outputs.changed == 'true' && steps.existing_pr.outputs.url == ''
        env:
          GH_TOKEN: ${{ secrets.TRACKER_GH_TOKEN || secrets.GITHUB_TOKEN }}
        working-directory: ${{ env.TARGET_PATH }}
        run: |
          body_file="$(mktemp)"
          cat > "$body_file" <<EOF
          Prepare support for an older Codex release from a fresh main checkout.

          - upstream release: ${{ steps.tracker.outputs.upstream_release_tag }}
          - local release version: v${{ steps.tracker.outputs.release_version }}
          - release branch: ${{ steps.tracker.outputs.release_branch }}
          EOF
          gh pr create \
            --base main \
            --head "${{ steps.tracker.outputs.release_branch }}" \
            --title "Legacy release v${{ steps.tracker.outputs.release_version }}" \
            --body-file "$body_file"
