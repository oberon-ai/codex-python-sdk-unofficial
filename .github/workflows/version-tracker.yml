name: Track Codex Upstream

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: codex-version-tracker
  cancel-in-progress: false

jobs:
  track-upstream:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install Codex CLI
        run: npm install --global @openai/codex

      - name: Show Codex version
        run: codex --version

      - name: Sync project environment
        run: uv sync --group codegen

      - name: Run upstream version tracker
        id: tracker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: uv run python -m codex_meta_agent --github-output "$GITHUB_OUTPUT"

      - name: Commit branch-sync changes
        if: steps.tracker.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "${{ steps.tracker.outputs.commit_message }}"
          git push origin HEAD:main

      - name: Publish GitHub release
        if: steps.tracker.outputs.release_needed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create \
            "${{ steps.tracker.outputs.release_tag }}" \
            --title "${{ steps.tracker.outputs.release_name }}" \
            --notes-file "${{ steps.tracker.outputs.release_notes_path }}"
