name: Prepare Backport Codex Release

on:
  workflow_dispatch:
    inputs:
      base_ref:
        description: "Git ref to prepare from; defaults to main but can point at a test branch"
        required: false
        default: "main"
        type: string
      target_version:
        description: "Codex release version or tag to prepare from a fresh main checkout"
        required: true
        type: string
      skip_verification:
        description: "Skip repository verification after Codex updates the checkout"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: backport-release-${{ inputs.target_version }}
  cancel-in-progress: false

jobs:
  prepare-backport-release:
    runs-on: ubuntu-latest
    env:
      CONTROLLER_PATH: controller
      TARGET_PATH: target
      CODEX_HOME: ${{ github.workspace }}/.codex-runtime

    steps:
      - name: Check out workflow controller
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true
          path: controller

      - name: Check out target repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          clean: true
          path: target

      - name: Ensure fresh target checkout
        env:
          BASE_REF: ${{ inputs.base_ref }}
        working-directory: ${{ env.TARGET_PATH }}
        run: |
          base_ref="${BASE_REF:-main}"
          git fetch origin "$base_ref"
          if git show-ref --verify --quiet "refs/remotes/origin/$base_ref"; then
            git checkout --detach "origin/$base_ref"
          else
            git checkout --detach FETCH_HEAD
          fi
          if [ -n "$(git status --porcelain)" ]; then
            echo "Expected a clean checkout before preparing a backport release." >&2
            git status --short >&2
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install Codex CLI
        run: npm install --global @openai/codex

      - name: Show Codex version
        run: codex --version

      - name: Bootstrap Codex API-key auth
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          mkdir -p "$CODEX_HOME"
          printenv OPENAI_API_KEY | codex login --with-api-key

      - name: Sync project environment
        working-directory: ${{ env.CONTROLLER_PATH }}
        run: uv sync --group codegen

      - name: Run backport release tracker
        id: tracker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TARGET_VERSION: ${{ inputs.target_version }}
          SKIP_VERIFICATION: ${{ inputs.skip_verification }}
          TARGET_REPO: ${{ github.workspace }}/target
        working-directory: ${{ env.CONTROLLER_PATH }}
        run: |
          cmd=(
            uv run python -m codex_meta_agent
            --repo-root "$TARGET_REPO"
            --github-output "$GITHUB_OUTPUT"
            --target-version "$TARGET_VERSION"
            --tracking-branch-prefix "puck/backport-release--"
          )
          if [ "$SKIP_VERIFICATION" = "true" ]; then
            cmd+=(--skip-verification)
          fi
          "${cmd[@]}"

      - name: Check whether backport branch already exists
        if: steps.tracker.outputs.changed == 'true'
        id: existing_branch
        working-directory: ${{ env.TARGET_PATH }}
        run: |
          if git ls-remote --exit-code --heads origin "${{ steps.tracker.outputs.release_branch }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check whether backport tag already exists
        if: steps.tracker.outputs.changed == 'true'
        id: existing_tag
        working-directory: ${{ env.TARGET_PATH }}
        run: |
          tag_name="backport-v${{ steps.tracker.outputs.release_version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$tag_name" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"

      - name: Commit backport release changes
        if: steps.tracker.outputs.changed == 'true' && steps.existing_branch.outputs.exists != 'true'
        env:
          TRACKER_GIT_AUTHOR_NAME: ${{ secrets.TRACKER_GIT_AUTHOR_NAME }}
          TRACKER_GIT_AUTHOR_EMAIL: ${{ secrets.TRACKER_GIT_AUTHOR_EMAIL }}
          GITHUB_ACTOR_NAME: ${{ github.actor }}
        working-directory: ${{ env.TARGET_PATH }}
        run: |
          author_name="${TRACKER_GIT_AUTHOR_NAME:-$GITHUB_ACTOR_NAME}"
          if [ -n "$TRACKER_GIT_AUTHOR_EMAIL" ]; then
            author_email="$TRACKER_GIT_AUTHOR_EMAIL"
          elif [ "$GITHUB_ACTOR_NAME" = "github-actions[bot]" ]; then
            author_email="41898282+github-actions[bot]@users.noreply.github.com"
          else
            author_email="$GITHUB_ACTOR_NAME@users.noreply.github.com"
          fi
          git switch -c "${{ steps.tracker.outputs.release_branch }}"
          git config user.name "$author_name"
          git config user.email "$author_email"
          git add -A
          git commit -m "${{ steps.tracker.outputs.commit_message }}"
          git push origin "HEAD:${{ steps.tracker.outputs.release_branch }}"

      - name: Check out existing backport branch head
        if: steps.tracker.outputs.changed == 'true' && steps.existing_branch.outputs.exists == 'true' && steps.existing_tag.outputs.exists != 'true'
        working-directory: ${{ env.TARGET_PATH }}
        run: |
          git fetch origin "${{ steps.tracker.outputs.release_branch }}"
          git checkout --detach FETCH_HEAD

      - name: Tag backport branch head
        if: steps.tracker.outputs.changed == 'true' && steps.existing_tag.outputs.exists != 'true'
        env:
          TRACKER_GIT_AUTHOR_NAME: ${{ secrets.TRACKER_GIT_AUTHOR_NAME }}
          TRACKER_GIT_AUTHOR_EMAIL: ${{ secrets.TRACKER_GIT_AUTHOR_EMAIL }}
          GITHUB_ACTOR_NAME: ${{ github.actor }}
        working-directory: ${{ env.TARGET_PATH }}
        run: |
          author_name="${TRACKER_GIT_AUTHOR_NAME:-$GITHUB_ACTOR_NAME}"
          if [ -n "$TRACKER_GIT_AUTHOR_EMAIL" ]; then
            author_email="$TRACKER_GIT_AUTHOR_EMAIL"
          elif [ "$GITHUB_ACTOR_NAME" = "github-actions[bot]" ]; then
            author_email="41898282+github-actions[bot]@users.noreply.github.com"
          else
            author_email="$GITHUB_ACTOR_NAME@users.noreply.github.com"
          fi
          tag_name="${{ steps.existing_tag.outputs.tag_name }}"
          git config user.name "$author_name"
          git config user.email "$author_email"
          git tag -a "$tag_name" -m "Backport release v${{ steps.tracker.outputs.release_version }}

          Dead-end backport branch head for ${{ steps.tracker.outputs.release_branch }}.
          Upstream release: ${{ steps.tracker.outputs.upstream_release_tag }}"
          git push origin "refs/tags/$tag_name"
